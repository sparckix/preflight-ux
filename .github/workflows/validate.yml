name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run structural validator
        run: python3 tools/validate_repo.py

      - name: Run uxpanel CLI validator
        run: python3 -m uxpanel validate

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run local simulations
        run: python3 tests/simulate_local.py

      - name: Check API syntax
        run: node --check api/panel.js

      - name: Run web regression checks
        run: |
          node tests/simulate_web_static.mjs
          node tests/simulate_web_logic.mjs
          node tests/simulate_byok_api.mjs
